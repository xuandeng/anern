<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News — Precision Bearings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>tailwind.config={theme:{extend:{colors:{ink:'#0b1020'}}}}</script>
    <script defer src="/static_website/assets/js/transitions.js"></script>
  </head>
  <body class="bg-ink text-white opacity-0 transition-opacity duration-300">
    <header class="fixed inset-x-0 top-0 z-50 bg-ink/80 backdrop-blur">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <a href="/static_website/index.html" class="inline-flex items-center gap-3">
            <div class="h-8 w-8 rounded-lg bg-gradient-to-tr from-blue-500 to-blue-300 ring-1 ring-white/10"></div>
            <span class="text-lg font-extrabold">Precision Bearings</span>
          </a>
          <nav class="hidden md:flex items-center gap-8 text-sm font-semibold">
            <a href="/static_website/index.html" class="hover:text-blue-300">Home</a>
            <a href="/static_website/chanpinzhanshi.html" class="hover:text-blue-300">Products</a>
            <a href="/static_website/xinwenzixun.html" class="hover:text-blue-300">News</a>
            <a href="/static_website/guanyuwomen.html" class="hover:text-blue-300">About</a>
            <a href="/static_website/lianxiwomen.html" class="hover:text-blue-300">Contact</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="pt-24" x-data="newsPage()">
      <section class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <h1 class="text-4xl font-extrabold">News</h1>
        <p class="text-white/70 mt-2">Latest updates from our company and the bearing industry.</p>

        <div class="mt-6 flex flex-wrap items-center gap-3">
          <input x-model="q" type="search" placeholder="Search articles..." class="w-72 px-3 py-2 rounded-lg bg-white/10 ring-1 ring-white/10 focus:ring-2 focus:ring-blue-400 outline-none placeholder:text-white/40" />
          <select x-model="tag" class="px-3 py-2 rounded-lg bg-white/10 ring-1 ring-white/10 focus:ring-2 focus:ring-blue-400 outline-none">
            <option value="all">All</option>
            <option>Expo</option>
            <option>Product</option>
            <option>Knowledge</option>
          </select>
        </div>

        <div class="mt-10 grid sm:grid-cols-2 lg:grid-cols-3 gap-6" data-reveal data-reveal-stagger="80">
          <template x-for="a in filtered">
            <a :href="a.href" class="group rounded-2xl bg-white/5 ring-1 ring-white/10 overflow-hidden hover:ring-white/30 transition">
              <img :src="a.img" :alt="a.title" class="h-40 w-full object-cover group-hover:scale-105 transition duration-500"/>
              <div class="p-5">
                <div class="text-xs uppercase tracking-wide text-white/60" x-text="a.tag"></div>
                <div class="mt-1 text-lg font-bold" x-text="a.title"></div>
                <div class="mt-1 text-white/70 line-clamp-2" x-text="a.snippet"></div>
                <div class="mt-3 text-xs text-white/50" x-text="a.date"></div>
              </div>
            </a>
          </template>
        </div>
      </section>
    </main>

    <footer class="mt-16 border-t border-white/10">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-10 text-sm text-white/60">© <script>document.write(new Date().getFullYear())</script> Precision Bearings Co., Ltd.</div>
    </footer>

    <script>
      function newsPage(){
        return {
          q: '',
          tag: 'all',
          articles: [
            { title: 'The 6th Linqing · China Bearing Expo opens on April 20', tag: 'Expo', date: '2024-04-05', snippet: 'Join us to explore our latest bearing technologies and live demos.', href: '/static_website/article_1503.html', img: 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=1200&auto=format&fit=crop' },
            { title: 'How to select bearings for corrosive environments', tag: 'Knowledge', date: '2024-03-22', snippet: 'Material selection, seals, and lubrication strategies for harsh conditions.', href: '#', img: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=1200&auto=format&fit=crop' },
            { title: 'New: Hybrid ceramic series launched', tag: 'Product', date: '2024-02-10', snippet: 'Higher speed capability and extended life using ceramic balls.', href: '#', img: 'https://images.unsplash.com/photo-1581093588401-16e7a66450b9?q=80&w=1200&auto=format&fit=crop' },
            { title: 'Case study: Robotics gearbox upgrade', tag: 'Knowledge', date: '2024-01-16', snippet: 'Reduced downtime and noise after switching to our bearings.', href: '#', img: 'https://images.unsplash.com/photo-1543946602-a0fce8117698?q=80&w=1200&auto=format&fit=crop' },
            { title: 'Meet us at Hannover Messe', tag: 'Expo', date: '2023-12-01', snippet: 'We are exhibiting in Hall 3 focusing on precision components.', href: '#', img: 'https://images.unsplash.com/photo-1531972111231-7482a960e109?q=80&w=1200&auto=format&fit=crop' },
            { title: 'Lubrication myths busted', tag: 'Knowledge', date: '2023-10-11', snippet: 'Common misconceptions about lubricants and bearing life.', href: '#', img: 'https://images.unsplash.com/photo-1565793298595-6a879b1d6b7e?q=80&w=1200&auto=format&fit=crop' }
          ],
          get filtered(){
            return this.articles.filter(a => (this.tag==='all'||a.tag===this.tag) && (this.q===''||(a.title+a.snippet).toLowerCase().includes(this.q.toLowerCase())))
          }
        }
      }
    </script>
  </body>
</html>
